<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Protected Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f2f2f2;
        }
        input {
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #message {
            margin-top: 20px;
            color: red;
        }
    </style>
</head>
<body>

<h1>Enter Password</h1>
<input type="password" id="passwordInput" placeholder="Password">
<button onclick="checkPassword()">Submit</button>
<div id="message"></div>

<script>
    function checkPassword() {
        const password = document.getElementById('passwordInput').value;
        const correctPassword = "4321"; // <-- change this to your password

        if(password === correctPassword) {
            window.location.href = "home.html"; // <-- your main site page
        } else {
            document.getElementById('message').innerText = "Wrong password!";
        }
    }
</script>

</body>
</html>
