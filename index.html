<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e8eaed;
    font-family: Arial, sans-serif;
  }

  .calculator {
    display: flex;
    gap: 20px;
    background: #f8f9fa;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 6px 30px rgba(0,0,0,0.15);
    width: 850px;
  }

  #display {
    position: absolute;
    top: 40px;
    width: 800px;
    height: 70px;
    font-size: 32px;
    text-align: right;
    border: none;
    background: transparent;
    outline: none;
  }

  .left, .right {
    display: grid;
    gap: 10px;
  }

  .left {
    grid-template-columns: repeat(4, 1fr);
    width: 60%;
  }

  .right {
    grid-template-columns: repeat(3, 1fr);
    width: 40%;
  }

  button {
    height: 55px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #f1f3f4;
  }

  button:hover {
    background: #e0e0e0;
  }

  .operator {
    background: #dadce0;
  }

  .equal {
    background: #4285f4;
    color: white;
  }

  .clear {
    background: #ea4335;
    color: white;
  }
</style>
</head>

<body>

<input type="text" id="display" disabled>

<div class="calculator">

  <!-- LEFT SIDE -->
  <div class="left">
    <button onclick="press('Math.sin(')">sin</button>
    <button onclick="press('Math.cos(')">cos</button>
    <button onclick="press('Math.tan(')">tan</button>
    <button onclick="press('Math.sqrt(')">√</button>

    <button onclick="press('Math.log10(')">log</button>
    <button onclick="press('Math.log(')">ln</button>
    <button onclick="press('Math.PI')">π</button>
    <button onclick="press('^')">xʸ</button>

    <button onclick="press('(')">(</button>
    <button onclick="press(')')">)</button>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <!-- ROW 1 -->
    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>

    <!-- ROW 2 -->
    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>

    <!-- ROW 3 -->
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>

    <!-- ROW 4 -->
    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="backspace()">⌫</button>

    <!-- OPERATORS -->
    <button class="operator" onclick="press('+')">+</button>
    <button class="operator" onclick="press('-')">−</button>
    <button class="operator" onclick="press('*')">×</button>

    <button class="operator" onclick="press('/')">÷</button>
    <button class="equal" onclick="calculate()">=</button>

    <!-- CLEAR BUTTON (ONLY HERE NOW) -->
    <button class="clear" onclick="clearDisplay()">C</button>
  </div>

</div>

<script>
let input = "";

function press(val) {
  input += val;
  document.getElementById("display").value = input;
}

function clearDisplay() {
  input = "";
  document.getElementById("display").value = "";
}

function backspace() {
  input = input.slice(0, -1);
  document.getElementById("display").value = input;
}

function calculate() {
  if (input === "4321") {
    window.location.href = "Home.html";
    return;
  }

  try {
    let formatted = input.replace(/\^/g, "**");
    input = eval(formatted).toString();
    document.getElementById("display").value = input;
  } catch {
    document.getElementById("display").value = "Error";
    input = "";
  }
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") calculate();
});
</script>

</body>
</html>
