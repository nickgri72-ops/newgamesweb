<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slides</title>

<link rel="stylesheet" href="/main.css">
<link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.2.0/css/all.css">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #000; /* black background */
    color: #fff; /* white text for contrast */
  }

  nav {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: #111;
    color: white;
  }

  nav img {
    height: 40px;
  }

  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    padding: 16px;
    justify-content: center;
  }

  .box {
    position: relative;
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
  }

  iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .featured {
    padding: 20px;
  }

  .featured h1 {
    margin-bottom: 10px;
    color: #fff; /* white headings */
  }

  .column, .row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .column a, .row a {
    position: relative;
  }

  .column img, .row img {
    width: 150px;
    border-radius: 8px;
  }

  .play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.2); /* semi-transparent white */
    padding: 10px;
    border-radius: 50%;
    color: #fff;
  }

  .content {
    padding: 20px;
  }

  .search {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .search input {
    flex: 1;
    padding: 10px;
    background: #222;
    border: 1px solid #444;
    color: #fff;
    border-radius: 4px;
  }

  .search button {
    padding: 10px;
    background: #333;
    color: #fff;
    border: 1px solid #444;
    border-radius: 4px;
    cursor: pointer;
  }

  #games {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  #games img {
    width: 120px;
    border-radius: 6px;
  }
</style>
</head>

<body>
