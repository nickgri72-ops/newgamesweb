<!DOCTYPE html>

<head>

<link rel="stylesheet" href="/main.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* NAV */
nav {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: #0d0d0d;
  border-bottom: 1px solid #222;
}

nav img {
  height: 36px;
  border-radius: 6px;
}

nav h1 {
  font-size: 20px;
  margin: 0;
}

/* SECTION */
.section {
  padding: 20px;
}

.section h2 {
  margin-bottom: 15px;
  font-size: 18px;
  color: #aaa;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 14px;
}

/* CARD */
.card {
  position: relative;
  transition: 0.2s;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card:hover {
  transform: scale(1.05);
}

.play-button {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.4);
  border-radius: 10px;
  opacity: 0;
  transition: 0.2s;
}

.card:hover .play-button {
  opacity: 1;
}

.play-button i {
  font-size: 20px;
}

/* SEARCH */
.search {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.search input {
  flex: 1;
  padding: 10px;
  background: #111;
  border: 1px solid #333;
  color: white;
  border-radius: 6px;
}

.search button {
  padding: 10px 14px;
  background: #222;
  border: 1px solid #333;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
  <img src="images/image_1884.jpeg">
  <h1>Frazer</h1>
